name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      needs_publish: ${{ steps.changes.outputs.needs_publish }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      # Resolve workspace:* to the actual core version
      - name: Resolve workspace dependencies
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/cli/package.json
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/mcp/package.json

      # Check which packages need publishing (only if version differs from npm)
      - id: changes
        run: |
          for pkg in core cli mcp; do
            LOCAL_VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            REMOTE_VERSION=$(npx npm@latest view @betterspec/${pkg} version 2>/dev/null || echo "NOT_FOUND")
            echo "  @betterspec/${pkg}: local=${LOCAL_VERSION} remote=${REMOTE_VERSION}"
            if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
              echo "NEEDS_${pkg}=true" >> $GITHUB_OUTPUT
            fi
          done

      # Publish only packages that changed
      - name: Publish @betterspec/core
        if: steps.changes.outputs.NEEDS_core == 'true'
        working-directory: packages/core
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      - name: Publish @betterspec/mcp
        if: steps.changes.outputs.NEEDS_mcp == 'true'
        working-directory: packages/mcp
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      - name: Publish @betterspec/cli
        if: steps.changes.outputs.NEEDS_cli == 'true'
        working-directory: packages/cli
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      # Summary of what was (or wasn't) published
      - name: Publish summary
        run: |
          echo "=== Publish Summary ==="
          for pkg in core cli mcp; do
            LOCAL_VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "${{ steps.changes.outputs['NEEDS_'$pkg] }}" == "true" ]; then
              echo "  ✅ @betterspec/${pkg}@${LOCAL_VERSION} published"
            else
              echo "  ⏭  @betterspec/${pkg}@${LOCAL_VERSION} already up to date"
