name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          rm -rf packages/*/dist
          cd packages/core && bun run build && cd ../..
          cd packages/mcp && bun run build && cd ../..
          cd packages/cli && bun run build && cd ../..

      - name: Run tests
        run: bun run test

      # Resolve workspace:* to the actual core version
      - name: Resolve workspace dependencies
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/cli/package.json
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/mcp/package.json

      # Check which packages need publishing
      - name: Check core
        id: check_core
        run: |
          LOCAL=$(node -p "require('./packages/core/package.json').version")
          REMOTE=$(npx npm@latest view @betterspec/core version 2>/dev/null || echo "NOT_FOUND")
          echo "core: local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then echo "needs_core=true" >> $GITHUB_OUTPUT; fi

      - name: Check mcp
        id: check_mcp
        run: |
          LOCAL=$(node -p "require('./packages/mcp/package.json').version")
          REMOTE=$(npx npm@latest view @betterspec/mcp version 2>/dev/null || echo "NOT_FOUND")
          echo "mcp: local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then echo "needs_mcp=true" >> $GITHUB_OUTPUT; fi

      - name: Check cli
        id: check_cli
        run: |
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          REMOTE=$(npx npm@latest view @betterspec/cli version 2>/dev/null || echo "NOT_FOUND")
          echo "cli: local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then echo "needs_cli=true" >> $GITHUB_OUTPUT; fi

      # Publish changed packages
      - name: Publish @betterspec/core
        if: steps.check_core.outputs.needs_core == 'true'
        working-directory: packages/core
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      - name: Publish @betterspec/mcp
        if: steps.check_mcp.outputs.needs_mcp == 'true'
        working-directory: packages/mcp
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      - name: Publish @betterspec/cli
        if: steps.check_cli.outputs.needs_cli == 'true'
        working-directory: packages/cli
        run: npx npm@latest publish --access public --registry https://registry.npmjs.org

      # Summary
      - name: Summary
        run: |
          echo "=== betterspec publish summary ==="
          echo "core: ${{ steps.check_core.outputs.needs_core == 'true' && 'published' || 'skipped (up to date)' }}"
          echo "mcp:  ${{ steps.check_mcp.outputs.needs_mcp == 'true' && 'published' || 'skipped (up to date)' }}"
          echo "cli:  ${{ steps.check_cli.outputs.needs_cli == 'true' && 'published' || 'skipped (up to date)' }}"
