name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      # Resolve workspace:* to the actual core version before publishing dependent packages
      - name: Resolve workspace dependencies
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/cli/package.json
          sed -i "s|\"workspace:\*\"|\"^${CORE_VERSION}\"|g" packages/mcp/package.json

      # Trusted publishing via OIDC — no NPM_TOKEN needed
      # Packages publish in dependency order: core → mcp → cli
      - name: Publish @betterspec/core
        working-directory: packages/core
        run: npm publish --access public

      - name: Publish @betterspec/mcp
        working-directory: packages/mcp
        run: npm publish --access public

      - name: Publish @betterspec/cli
        working-directory: packages/cli
        run: npm publish --access public
